openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Hazi Media API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: orders
    description: Promotion order operations
  - name: dashboard
    description: Dashboard summary operations
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit a promotion order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a specific order by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/messages:
    get:
      operationId: listMessages
      tags: [orders]
      summary: Get chat messages for an order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendMessage
      tags: [orders]
      summary: Send a chat message for an order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/pay:
    post:
      operationId: createOrderPayment
      tags: [orders]
      summary: Create a PayPal payment for an approved order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PayPal order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePaypalOrderResponse"
        "403":
          description: Forbidden or order not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/capture:
    post:
      operationId: captureOrderPayment
      tags: [orders]
      summary: Capture PayPal payment for an order and mark it completed
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureOrderPaymentBody"
      responses:
        "200":
          description: Payment captured, order completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Payment failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard stats summary for authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders:
    get:
      operationId: listAllOrders
      tags: [admin]
      summary: List all orders from all clients (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All orders with client info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminOrder"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/summary:
    get:
      operationId: getAdminSummary
      tags: [admin]
      summary: Get platform-wide stats (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSummary"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/create-paypal-order:
    post:
      operationId: createPaypalOrder
      tags: [payments]
      summary: Create a PayPal order for a promotion package
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaypalOrderBody"
      responses:
        "200":
          description: PayPal order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePaypalOrderResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/capture-paypal-order:
    post:
      operationId: capturePaypalOrder
      tags: [payments]
      summary: Capture a PayPal payment and create the promotion order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapturePaypalOrderBody"
      responses:
        "201":
          description: Payment captured and order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Payment failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/clients:
    get:
      operationId: listClients
      tags: [admin]
      summary: List all registered clients (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All registered clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientInfo"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - name
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - isAdmin
        - createdAt

    CreateOrderBody:
      type: object
      properties:
        instagramLink:
          type: string
        message:
          type: string
        packageType:
          type: string
          enum: [starter, growth, premium]
      required:
        - instagramLink
        - message
        - packageType

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, active, completed, cancelled]
      required:
        - status

    Order:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        instagramLink:
          type: string
        message:
          type: string
        packageType:
          type: string
          enum: [starter, growth, premium]
        status:
          type: string
          enum: [pending, active, completed, cancelled]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - instagramLink
        - message
        - packageType
        - status
        - createdAt

    AdminOrder:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        clientName:
          type: string
        clientEmail:
          type: string
        instagramLink:
          type: string
        message:
          type: string
        packageType:
          type: string
          enum: [starter, growth, premium]
        status:
          type: string
          enum: [pending, active, completed, cancelled]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - clientName
        - clientEmail
        - instagramLink
        - message
        - packageType
        - status
        - createdAt

    ClientInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        totalOrders:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - totalOrders
        - createdAt

    DashboardSummary:
      type: object
      properties:
        totalOrders:
          type: integer
        activeOrders:
          type: integer
        completedOrders:
          type: integer
        pendingOrders:
          type: integer
      required:
        - totalOrders
        - activeOrders
        - completedOrders
        - pendingOrders

    Message:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: string
        userId:
          type: string
        senderName:
          type: string
        isAdmin:
          type: boolean
        content:
          type: string
        createdAt:
          type: string
      required:
        - id
        - orderId
        - userId
        - senderName
        - isAdmin
        - content
        - createdAt

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2000
      required:
        - content

    CaptureOrderPaymentBody:
      type: object
      properties:
        paypalOrderId:
          type: string
      required:
        - paypalOrderId

    CreatePaypalOrderBody:
      type: object
      properties:
        packageType:
          type: string
          enum: [starter, growth, premium]
        instagramLink:
          type: string
        message:
          type: string
      required:
        - packageType
        - instagramLink
        - message

    CreatePaypalOrderResponse:
      type: object
      properties:
        paypalOrderId:
          type: string
        amount:
          type: string
        currency:
          type: string
      required:
        - paypalOrderId
        - amount
        - currency

    CapturePaypalOrderBody:
      type: object
      properties:
        paypalOrderId:
          type: string
        instagramLink:
          type: string
        message:
          type: string
        packageType:
          type: string
          enum: [starter, growth, premium]
      required:
        - paypalOrderId
        - instagramLink
        - message
        - packageType

    AdminSummary:
      type: object
      properties:
        totalClients:
          type: integer
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        activeOrders:
          type: integer
        completedOrders:
          type: integer
        cancelledOrders:
          type: integer
      required:
        - totalClients
        - totalOrders
        - pendingOrders
        - activeOrders
        - completedOrders
        - cancelledOrders
